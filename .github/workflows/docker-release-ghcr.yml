name: Build Release Docker Image to GHCR

on:
  push:
    branches:
      - release
    paths:
      - astrbot/cli/__init__.py
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-release-ghcr
  cancel-in-progress: true

jobs:
  build-image:
    runs-on: ubuntu-latest
    env:
      GHCR_OWNER: ${{ github.repository_owner }}
      HAS_GHCR_TOKEN: ${{ secrets.GHCR_GITHUB_TOKEN != '' }}
      VERSION_FILE: astrbot/cli/__init__.py

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check version change
        id: check-version
        shell: bash
        run: |
          set -euo pipefail

          read_version() {
            sed -nE 's/^__version__[[:space:]]*=[[:space:]]*"([^"]+)"/\1/p'
          }

          current_version="$(read_version < "${VERSION_FILE}")"
          if [ -z "$current_version" ]; then
            echo "Unable to find __version__ in ${VERSION_FILE}" >&2
            exit 1
          fi

          echo "tag=$current_version" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          previous_file="$(mktemp)"
          if git show "${{ github.event.before }}:${VERSION_FILE}" > "$previous_file" 2>/dev/null; then
            previous_version="$(read_version < "$previous_file")"
          else
            previous_version=""
          fi
          rm -f "$previous_file"

          if [ "$previous_version" = "$current_version" ]; then
            echo "Version unchanged, skipping build"
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version changed from $previous_version to $current_version"
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop build without version change
        if: steps.check-version.outputs.version_changed == 'false'
        shell: bash
        run: exit 0

      - name: Resolve image metadata
        id: meta-vars
        shell: bash
        run: |
          short_sha="$(git rev-parse --short=6 HEAD)"
          owner_lc="$(echo "${{ env.GHCR_OWNER }}" | tr '[:upper:]' '[:lower:]')"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "image_name=ghcr.io/$owner_lc/astrbot" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.13.0"
          cache: "pnpm"
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: Build dashboard dist
        shell: bash
        run: |
          pnpm --dir dashboard install --frozen-lockfile
          pnpm --dir dashboard run build
          git rev-parse HEAD > dashboard/dist/assets/version
          rm -rf astrbot/dashboard/dist
          mkdir -p astrbot/dashboard/dist
          cp -r dashboard/dist/. astrbot/dashboard/dist/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR with PAT
        if: env.HAS_GHCR_TOKEN == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_OWNER }}
          password: ${{ secrets.GHCR_GITHUB_TOKEN }}

      - name: Log in to GHCR with GITHUB_TOKEN
        if: env.HAS_GHCR_TOKEN != 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.meta-vars.outputs.image_name }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.check-version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.check-version.outputs.tag }}
            type=semver,pattern={{major}},value=${{ steps.check-version.outputs.tag }}
            type=raw,value=${{ steps.meta-vars.outputs.short_sha }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.multistage
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
