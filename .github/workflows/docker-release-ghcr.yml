name: Build Release Docker Image to GHCR

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-release-ghcr
  cancel-in-progress: true

jobs:
  build-image:
    runs-on: ubuntu-latest
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      GHCR_OWNER: ${{ github.repository_owner }}
      HAS_GHCR_TOKEN: ${{ secrets.GHCR_GITHUB_TOKEN != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1

      - name: Check for new commits in the last 24 hours
        if: github.event_name == 'schedule'
        id: check-commits
        shell: bash
        run: |
          latest_commit_ts="$(git log -1 --format=%ct)"
          now_ts="$(date +%s)"
          if [ $((now_ts - latest_commit_ts)) -gt 86400 ]; then
            echo "No new commits in the last 24 hours, skipping build"
            echo "has_commits=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found new commits in the last 24 hours"
            echo "has_commits=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop scheduled build without new commits
        if: github.event_name == 'schedule' && steps.check-commits.outputs.has_commits == 'false'
        shell: bash
        run: exit 0

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          short_sha="$(git rev-parse --short=6 HEAD)"
          build_date="$(date -u +%F)"
          owner_lc="$(echo "${{ env.GHCR_OWNER }}" | tr '[:upper:]' '[:lower:]')"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "build_date=$build_date" >> "$GITHUB_OUTPUT"
          echo "image_name=ghcr.io/$owner_lc/astrbot" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.13.0"
          cache: "pnpm"
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: Build dashboard dist
        shell: bash
        run: |
          pnpm --dir dashboard install --frozen-lockfile
          pnpm --dir dashboard run build
          git rev-parse HEAD > dashboard/dist/assets/version
          rm -rf astrbot/dashboard/dist
          mkdir -p astrbot/dashboard/dist
          cp -r dashboard/dist/. astrbot/dashboard/dist/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR with PAT
        if: env.HAS_GHCR_TOKEN == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_OWNER }}
          password: ${{ secrets.GHCR_GITHUB_TOKEN }}

      - name: Log in to GHCR with GITHUB_TOKEN
        if: env.HAS_GHCR_TOKEN != 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.multistage
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.image_name }}:latest
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.build_date }}
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.short_sha }}
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.build_date }}-${{ steps.meta.outputs.short_sha }}
