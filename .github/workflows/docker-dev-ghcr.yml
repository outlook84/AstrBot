name: Build Dev Docker Image to GHCR

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'devdev'

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-dev-ghcr-${{ github.event.inputs.branch || 'dev' }}
  cancel-in-progress: true

jobs:
  build-image:
    runs-on: ubuntu-latest
    env:
      GHCR_OWNER: ${{ github.repository_owner }}
      HAS_GHCR_TOKEN: ${{ secrets.GHCR_GITHUB_TOKEN != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 1

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          short_sha="$(git rev-parse --short=6 HEAD)"
          owner_lc="$(echo "${{ env.GHCR_OWNER }}" | tr '[:upper:]' '[:lower:]')"
          # Normalize the branch name to a Docker tag-safe value.
          branch_tag="$(printf '%s' "${{ github.event.inputs.branch }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's|[[:space:]/]+|-|g; s|[^a-z0-9._-]+|-|g; s|^[.-]+||; s|[.-]+$||; s|-+|-|g')"
          if [ -z "$branch_tag" ]; then
            echo "Branch name produced an empty Docker tag" >&2
            exit 1
          fi
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "branch_tag=$branch_tag" >> "$GITHUB_OUTPUT"
          echo "image_name=ghcr.io/$owner_lc/astrbot" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.13.0"
          cache: "pnpm"
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: Build dashboard dist
        shell: bash
        run: |
          pnpm --dir dashboard install --frozen-lockfile
          pnpm --dir dashboard run build
          git rev-parse HEAD > dashboard/dist/assets/version
          rm -rf astrbot/dashboard/dist
          mkdir -p astrbot/dashboard/dist
          cp -r dashboard/dist/. astrbot/dashboard/dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve Dockerfile path
        id: dockerfile
        shell: bash
        run: |
          dockerfile="./Dockerfile.multistage"
          if [ ! -f "$dockerfile" ]; then
            dockerfile="./Dockerfile"
          fi
          echo "path=$dockerfile" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR with PAT
        if: env.HAS_GHCR_TOKEN == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_OWNER }}
          password: ${{ secrets.GHCR_GITHUB_TOKEN }}

      - name: Log in to GHCR with GITHUB_TOKEN
        if: env.HAS_GHCR_TOKEN != 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.path }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.branch_tag }}
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.branch_tag }}-${{ steps.meta.outputs.short_sha }}
