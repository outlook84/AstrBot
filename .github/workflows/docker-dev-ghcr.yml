name: Build Dev Image to GHCR

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-dev-ghcr
  cancel-in-progress: true

jobs:
  build-dev-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v6
        with:
          ref: dev
          fetch-depth: 1

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          short_sha="$(git rev-parse --short=6 HEAD)"
          owner_lc="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "image_name=ghcr.io/$owner_lc/astrbot" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.13.0"
          cache: "pnpm"
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: Build dashboard dist
        shell: bash
        run: |
          pnpm --dir dashboard install --frozen-lockfile
          pnpm --dir dashboard run build
          git rev-parse HEAD > dashboard/dist/assets/version
          mkdir -p data
          cp -r dashboard/dist data/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dev image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.multistage
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.image_name }}:dev
            ${{ steps.meta.outputs.image_name }}:dev-${{ steps.meta.outputs.short_sha }}
